services:
  mcp-gateway:
    image: docker/mcp-gateway:latest
    restart: unless-stopped
    command:
      - --transport=sse
      - --port=9000
      - --servers=playwright,fetch,time,docker://adapter-service:latest
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  agent-service:
    build:
      context: ./agent-service
    restart: unless-stopped
    depends_on:
      - mcp-gateway
    volumes:
      - ./agent-service/config.yml:/app/agent-service/config.yml:ro
    ports:
      - "8000:8000"

  adapter-service:
    image: adapter-service:latest
    build:
      context: ./adapter-service
    restart: unless-stopped
    depends_on:
      hub-service:
        condition: service_started
    command:
      - adapter-service
    volumes:
      - ./adapter-service/config.yml:/app/adapter-service/config.yml:ro
    ports:
      - "8010:8010"

  hub-service:
    build:
      context: ./hub-service
    restart: unless-stopped
    depends_on:
      agent-service:
        condition: service_started
    volumes:
      - ./hub-service/config.yml:/app/hub-service/config.yml:ro
    ports:
      - "8020:8020"
