services:
  mcp-gateway:
    image: docker/mcp-gateway:latest
    restart: unless-stopped
    environment:
      DOCKER_MCP_IN_CONTAINER: "1"
      MCP_GATEWAY_AUTH_TOKEN: ${MCP_GATEWAY_AUTH_TOKEN}
    command:
      - --transport=sse
      - --port=9000
      - --servers=${MCP_GATEWAY_SERVERS}
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  agent-service:
    build:
      context: ./agent-service
    restart: unless-stopped
    depends_on:
      - mcp-gateway
    environment:
      MODEL_NAME: ${MODEL_NAME}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      MCP_GATEWAY_SSE_URL: http://mcp-gateway:9000/sse
      MCP_GATEWAY_AUTH_TOKEN: ${MCP_GATEWAY_AUTH_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL}
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
