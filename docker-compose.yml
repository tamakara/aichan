services:
  cli_channel:
    build:
      context: .
      dockerfile: cli_channel/Dockerfile
    environment:
      CLI_SERVER_HOST: 0.0.0.0
      CLI_SERVER_PORT: 8765
    ports:
      - "8765:8765"
    restart: unless-stopped

  aichan:
    build:
      context: .
      dockerfile: aichan/Dockerfile
    depends_on:
      - cli_channel
    env_file:
      - ./aichan/.env
    environment:
      CLI_SERVER_BASE_URL: http://cli_channel:8765
    restart: unless-stopped
