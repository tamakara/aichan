services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  mcp-gateway:
    image: docker/mcp-gateway:latest
    restart: unless-stopped
    command:
      - --transport=sse
      - --port=9000
      - --servers=playwright,fetch,time,docker://channel-service:latest
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  agent-service:
    build:
      context: ./agent-service
    restart: unless-stopped
    depends_on:
      - mcp-gateway
    volumes:
      - ./agent-service/config.yml:/app/agent-service/config.yml:ro
    ports:
      - "8000:8000"

  channel-service:
    image: channel-service:latest
    build:
      context: ./channel-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
    command:
      - channel-service
    volumes:
      - ./channel-service/config.yml:/app/channel-service/config.yml:ro
    ports:
      - "8010:8010"

  hub-service:
    build:
      context: ./hub-service
    restart: unless-stopped
    depends_on:
      agent-service:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./hub-service/config.yml:/app/hub-service/config.yml:ro
    ports:
      - "8020:8020"
