services:
  aichan:
    build:
      context: ./aichan
      dockerfile: Dockerfile
    environment:
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
    ports:
      - "8000:8000"
    restart: unless-stopped

  cli_gateway:
    build:
      context: ./gateway/channels/cli
      dockerfile: Dockerfile
    environment:
      CLI_SERVER_HOST: 0.0.0.0
      CLI_SERVER_PORT: 9000
      CLI_GATEWAY_HOST: cli_gateway
      AICHAN_REGISTRY_URL: http://aichan:8000/internal/registry/register
    ports:
      - "9000:9000"
    restart: unless-stopped
    